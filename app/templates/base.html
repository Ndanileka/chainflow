<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ChainFlow{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}?v=1.0.2">
  </head>
  <body class="bg-[#09090b] text-zinc-300 antialiased selection:bg-teal-500/30 font-sans flex flex-col min-h-screen">
    
    <!-- Global Header -->
    <header class="w-full bg-[#09090b]/80 backdrop-blur-md border-b border-zinc-800/80 shrink-0 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-8">
          <a href="/" class="flex items-center gap-2 group">
            <div class="w-8 h-8 rounded bg-indigo-500/20 border border-indigo-500/50 flex items-center justify-center text-indigo-400 group-hover:bg-indigo-500/30 transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <span class="font-bold text-white tracking-tight text-lg">ChainFlow</span>
          </a>
          <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-zinc-400">
            <a href="/" class="hover:text-white transition">Dashboard</a>
            <a href="/leaderboard" class="hover:text-white transition">Leaderboard</a>
            <a href="/about" class="hover:text-white transition">About</a>
          </nav>
        </div>
        <div>
          <a href="/login" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-500 rounded-md transition shadow-lg shadow-indigo-500/20">Sign In</a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col relative z-0">
      {% block body %}{% endblock %}
    </div>

    <!-- Global Footer -->
    <footer class="bg-[#09090b] border-t border-zinc-900 shrink-0 py-8 relative z-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="text-xs text-zinc-500">
          &copy; 2026 ChainFlow Simulation. Educational purposes only.
        </div>
        <div class="flex items-center gap-4 text-xs font-medium text-zinc-400">
          <a href="/about" class="hover:text-white transition">Terms</a>
          <a href="/about" class="hover:text-white transition">Privacy</a>
          <a href="https://github.com/Ndanileka/chainflow" class="hover:text-white transition flex items-center gap-1">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path></svg>
            GitHub
          </a>
        </div>
      </div>
    </footer>
    <script src="{{ url_for('static', path='js/app.js') }}?v=1.0.3"></script>
  </body>
</html>
