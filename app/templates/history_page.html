{% extends "base.html" %}

{% block body %}
<div class="min-h-screen bg-[#09090b] text-zinc-300 flex flex-col">
  <!-- Header -->
  <header class="border-b border-zinc-900 bg-[#09090b]/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
    <a href="/" class="text-xs text-indigo-400 hover:text-indigo-300 flex items-center gap-1.5 font-semibold font-mono uppercase tracking-wider">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Back to Dashboard
    </a>
    <span class="text-xs font-mono text-zinc-500 uppercase tracking-widest">Historical Investigation</span>
  </header>

  <!-- Article Content -->
  <main class="flex-1 overflow-y-auto px-6 py-12">
    <article class="max-w-3xl mx-auto space-y-6 prose prose-invert">
      <div class="space-y-2 border-b border-zinc-800 pb-6">
        <span class="text-xs uppercase tracking-widest font-mono text-indigo-500 font-bold">Investigation</span>
        <h1 class="text-4xl font-extrabold text-white tracking-tight mt-1">{{ study.title }}</h1>
        <p class="text-lg text-zinc-400 font-medium leading-relaxed">{{ study.subtitle }}</p>
      </div>

      <div class="text-zinc-300 leading-relaxed space-y-6 pt-4 text-base">
        {{ study.overview_html | safe }}
        
        <hr class="border-zinc-800" />
        
        {{ study.history_html | safe }}
      </div>
    </article>
  </main>
</div>
{% endblock %}
