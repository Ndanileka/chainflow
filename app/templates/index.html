{% extends "base.html" %}

{% block body %}
<div class="flex flex-1 bg-[#09090b] flex-col md:flex-row text-zinc-300">
  
  <!-- Sidebar -->
  <aside class="w-full shrink-0 border-r border-zinc-900 bg-[#09090b] md:w-96 md:overflow-y-auto">
    <div class="p-6">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-xl font-bold tracking-tight text-white mb-1">ChainFlow</h1>
          <p class="text-xs text-zinc-500 uppercase tracking-widest">Simulation & System Analytics</p>
        </div>
        <div>
          <select name="currency" 
                  hx-get="/models/{{ active_id }}"
                  hx-target="#article-content"
                  class="bg-zinc-900 border border-zinc-800 rounded px-2 py-1.5 text-xs text-zinc-400 focus:outline-none focus:border-indigo-500 cursor-pointer">
            <option value="USD" {% if currency == "USD" %}selected{% endif %}>USD ($)</option>
            <option value="ZAR" {% if currency == "ZAR" %}selected{% endif %}>ZAR (R)</option>
          </select>
        </div>
      </div>
      
      <nav class="space-y-4">
        <h2 class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-4">Case Studies</h2>
        <div id="sidebar-nav" class="space-y-4">
          {% include "partials/sidebar_nav.html" %}
        </div>
      </nav>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="flex-1 overflow-y-auto p-6 md:p-10" id="article-content">
    {% include "partials/article.html" %}
  </main>
</div>
{% endblock %}
