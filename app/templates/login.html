{% extends "base.html" %}
{% block title %}Sign In - ChainFlow{% endblock %}

{% block body %}
<div class="flex-1 flex items-center justify-center py-20 px-4 sm:px-6 lg:px-8 relative">
  <!-- Decorative background blob -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="max-w-md w-full space-y-8 bg-zinc-900/50 backdrop-blur-xl p-10 rounded-2xl border border-zinc-800/80 shadow-2xl relative z-10">
    <div class="text-center">
      <div class="mx-auto w-12 h-12 rounded-lg bg-indigo-500/20 border border-indigo-500/50 flex items-center justify-center text-indigo-400 mb-6 shadow-lg shadow-indigo-500/20">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      <h2 class="text-3xl font-extrabold text-white tracking-tight">Welcome back</h2>
      <p class="mt-2 text-sm text-zinc-400">Sign in to save your custom simulations</p>
    </div>
    
    <form class="mt-8 space-y-6" action="#" method="POST" onsubmit="event.preventDefault();">
      <div class="space-y-4 rounded-md shadow-sm">
        <div>
          <label for="email-address" class="sr-only">Email address</label>
          <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none relative block w-full px-4 py-3 border border-zinc-700 bg-zinc-800/50 placeholder-zinc-500 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm transition" placeholder="Email address">
        </div>
        <div>
          <label for="password" class="sr-only">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none relative block w-full px-4 py-3 border border-zinc-700 bg-zinc-800/50 placeholder-zinc-500 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm transition" placeholder="Password">
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-zinc-700 rounded bg-zinc-800 cursor-pointer">
          <label for="remember-me" class="ml-2 block text-sm text-zinc-400 cursor-pointer">
            Remember me
          </label>
        </div>

        <div class="text-sm">
          <a href="#" class="font-medium text-indigo-400 hover:text-indigo-300 transition">
            Forgot your password?
          </a>
        </div>
      </div>

      <div>
        <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-indigo-600 hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-[#09090b] transition shadow-lg shadow-indigo-500/25">
          Sign in
        </button>
      </div>
      
      <div class="relative mt-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-zinc-800"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-zinc-900/50 text-zinc-500 backdrop-blur-xl">Or continue with</span>
        </div>
      </div>
      
      <div class="mt-6">
        <button type="button" class="w-full flex items-center justify-center px-4 py-3 border border-zinc-700 bg-zinc-800 hover:bg-zinc-700 text-sm font-medium rounded-lg text-white transition shadow-sm">
          <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path></svg>
          GitHub
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
