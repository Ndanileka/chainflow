<div class="flex items-center justify-between gap-3">
  <h2 class="text-base font-semibold text-zinc-950">Saved Scenarios</h2>
  {% if saved_scenario %}
    <span class="rounded bg-teal-50 px-2 py-1 text-xs font-medium text-teal-800">Saved</span>
  {% endif %}
</div>

{% if scenarios %}
  <div class="mt-3 space-y-2">
    {% for item in scenarios %}
      <a
        href="/scenarios/{{ item.id }}"
        class="block rounded-md border px-3 py-2 text-sm transition hover:border-teal-300 hover:bg-teal-50 {% if active_id == item.id %}border-teal-400 bg-teal-50{% else %}border-zinc-200 bg-white{% endif %}">
        <span class="block truncate font-medium text-zinc-900">{{ item.name }}</span>
        <span class="mt-1 block text-xs text-zinc-500">
          {{ item.initial_participants|integer }} initial · {{ item.recruitment_model|title }}
        </span>
      </a>
    {% endfor %}
  </div>
{% else %}
  <p class="mt-3 text-sm leading-6 text-zinc-500">No saved scenarios yet.</p>
{% endif %}
